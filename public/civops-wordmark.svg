<!--
  CivOps LLC — Wordmark
  "CivOps" Inter 800 tight tracking
  Three-layer underline: cyan | emerald | amber (equal thirds)
  viewBox width estimated for Inter 800 at 72px ≈ 316px for "CivOps"
-->
<svg viewBox="0 0 340 96" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="CivOps LLC">
  <!-- Primary wordmark -->
  <text
    x="0" y="68"
    font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
    font-size="72"
    font-weight="800"
    fill="#EDF4F8"
    letter-spacing="-1"
  >CivOps</text>

  <!-- LLC — smaller, muted, aligned to baseline -->
  <text
    x="262" y="42"
    font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
    font-size="18"
    font-weight="500"
    fill="#7A9BAB"
    letter-spacing="2"
  >LLC</text>

  <!-- Three-layer underline: equal thirds spanning the wordmark -->
  <!-- Micro (cyan) -->
  <rect x="0"   y="80" width="104" height="4" rx="2" fill="#00C2E0"/>
  <!-- Enterprise (emerald) -->
  <rect x="108" y="80" width="104" height="4" rx="2" fill="#0DD68F"/>
  <!-- Macro (amber) -->
  <rect x="216" y="80" width="104" height="4" rx="2" fill="#F5A623"/>
</svg>
